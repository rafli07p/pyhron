# =============================================================================
# Pyhron API - Kubernetes Deployment, Service, and HPA
# =============================================================================
# Apply: kubectl apply -f infra/kubernetes/namespace.yaml
#        kubectl apply -f infra/kubernetes/deployment.yaml
# =============================================================================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyhron-api
  namespace: pyhron
  labels:
    app: pyhron-api
    component: backend
    part-of: pyhron-platform
    version: "1.0.0"
  annotations:
    kubernetes.io/change-cause: "Initial deployment"
spec:
  replicas: 2
  revisionHistoryLimit: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: pyhron-api
  template:
    metadata:
      labels:
        app: pyhron-api
        component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: pyhron-api
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - "ALL"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - pyhron-api
                topologyKey: kubernetes.io/hostname
      containers:
        - name: pyhron-api
          image: pyhron-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: pyhron-config
                  key: environment
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pyhron-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: pyhron-secrets
                  key: redis-url
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: pyhron-config
                  key: kafka-bootstrap-servers
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: pyhron-secrets
                  key: encryption-key
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: pyhron-config
                  key: log-level
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          volumeMounts:
            - name: app-logs
              mountPath: /app/logs
            - name: tmp
              mountPath: /app/tmp
      volumes:
        - name: app-logs
          emptyDir:
            sizeLimit: 500Mi
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi

---
apiVersion: v1
kind: Service
metadata:
  name: pyhron-api
  namespace: pyhron
  labels:
    app: pyhron-api
    component: backend
spec:
  type: ClusterIP
  selector:
    app: pyhron-api
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  sessionAffinity: None

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pyhron-api-hpa
  namespace: pyhron
  labels:
    app: pyhron-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pyhron-api
  minReplicas: 2
  maxReplicas: 20
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
        - type: Percent
          value: 100
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Min
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "1000"

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pyhron-api
  namespace: pyhron
  labels:
    app: pyhron-api

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pyhron-api-pdb
  namespace: pyhron
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: pyhron-api
