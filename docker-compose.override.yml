# Pyhron Trading Platform — Docker Compose Override (Local Development)
# Loaded automatically alongside docker-compose.yaml.
# Provides: host port exposure for direct DB/cache access during development,
# hot-reload volume mounts for API and worker services.
#
# NOT for production — production uses internal Docker network only.

services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  api:
    volumes:
      - ./apps:/app/apps:ro
      - ./shared:/app/shared:ro
      - ./services:/app/services:ro
      - ./data_platform:/app/data_platform:ro
      - ./strategy_engine:/app/strategy_engine:ro
      - ./commodity_linkage_engine:/app/commodity_linkage_engine:ro
      - ./macro_intelligence:/app/macro_intelligence:ro
      - ./governance_intelligence:/app/governance_intelligence:ro
    environment:
      APP_ENV: development
      LOG_LEVEL: DEBUG
      RELOAD: "true"

  worker:
    volumes:
      - ./data_platform:/app/data_platform:ro
      - ./shared:/app/shared:ro
      - ./services:/app/services:ro
    environment:
      APP_ENV: development
      LOG_LEVEL: DEBUG
