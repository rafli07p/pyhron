# Pyhron Trading Platform - Prometheus Alerting Rules

groups:
  # ---------------------------------------------------------------------------
  # Latency Alerts
  # ---------------------------------------------------------------------------
  - name: pyhron.latency
    rules:
      - alert: HighOrderLatency
        expr: |
          histogram_quantile(0.95, sum(rate(pyhron_order_fill_latency_seconds_bucket[5m])) by (le))
          > 0.5
        for: 2m
        labels:
          severity: warning
          team: trading
          component: order-execution
        annotations:
          summary: "High order execution latency detected"
          description: >
            p95 order latency is {{ $value | humanizeDuration }} which exceeds
            the 500ms threshold. This may impact execution quality and slippage.

      - alert: CriticalOrderLatency
        expr: |
          histogram_quantile(0.99, sum(rate(pyhron_order_fill_latency_seconds_bucket[5m])) by (le))
          > 2.0
        for: 1m
        labels:
          severity: critical
          team: trading
          component: order-execution
        annotations:
          summary: "Critical order execution latency"
          description: >
            p99 order latency is {{ $value | humanizeDuration }}. Orders are
            severely delayed. Immediate investigation required.

      - alert: HighAPIResponseTime
        expr: |
          histogram_quantile(0.95, sum(rate(pyhron_http_request_duration_seconds_bucket{job="pyhron-api"}[5m])) by (le))
          > 1.0
        for: 5m
        labels:
          severity: warning
          team: platform
          component: api
        annotations:
          summary: "API response time is elevated"
          description: >
            p95 API response time is {{ $value | humanizeDuration }}.
            Check for database bottlenecks or resource contention.

      - alert: HighWebSocketLatency
        expr: |
          histogram_quantile(0.95, sum(rate(pyhron_ws_message_latency_seconds_bucket[5m])) by (le))
          > 0.5
        for: 5m
        labels:
          severity: warning
          team: platform
          component: websocket
        annotations:
          summary: "WebSocket message delivery latency is high"
          description: >
            p95 Kafka-to-WebSocket delivery latency is {{ $value | humanizeDuration }}.
            Check Redis pub/sub and bridge consumers.

  # ---------------------------------------------------------------------------
  # DLQ & Data Pipeline Alerts
  # ---------------------------------------------------------------------------
  - name: pyhron.data_pipeline
    rules:
      - alert: DLQDepthWarning
        expr: |
          pyhron_dlq_depth > 100
        for: 5m
        labels:
          severity: warning
          team: platform
          component: data-pipeline
        annotations:
          summary: "DLQ depth exceeds 100 messages"
          description: >
            DLQ topic {{ $labels.topic }} has {{ $value }} messages awaiting
            reprocessing. Investigate validation failures.

      - alert: DLQDepthCritical
        expr: |
          pyhron_dlq_depth > 1000
        for: 2m
        labels:
          severity: critical
          team: platform
          component: data-pipeline
        annotations:
          summary: "DLQ depth exceeds 1000 — data loss risk"
          description: >
            DLQ topic {{ $labels.topic }} has {{ $value }} messages.
            High failure rate suggests upstream data quality issue or schema change.

      - alert: IngestionStalled
        expr: |
          rate(pyhron_records_ingested_total{status="success"}[10m]) == 0
          and
          pyhron_records_ingested_total{status="success"} > 0
        for: 15m
        labels:
          severity: critical
          team: platform
          component: data-pipeline
        annotations:
          summary: "Data ingestion has stalled"
          description: >
            No successful records ingested from {{ $labels.source }} in the
            last 15 minutes. Check data source connectivity.

      - alert: HighIngestionErrorRate
        expr: |
          rate(pyhron_records_ingested_total{status="error"}[5m])
          / (rate(pyhron_records_ingested_total{status="success"}[5m]) + rate(pyhron_records_ingested_total{status="error"}[5m]))
          > 0.1
        for: 5m
        labels:
          severity: warning
          team: platform
          component: data-pipeline
        annotations:
          summary: "Ingestion error rate exceeds 10%"
          description: >
            Source {{ $labels.source }} has a {{ $value | humanizePercentage }}
            error rate. Check data quality and validation rules.

      - alert: KafkaConsumerLag
        expr: |
          kafka_consumergroup_lag_sum{consumergroup=~"pyhron-.*"} > 10000
        for: 5m
        labels:
          severity: warning
          team: platform
          component: messaging
        annotations:
          summary: "Kafka consumer lag is high"
          description: >
            Consumer group {{ $labels.consumergroup }} has a lag of
            {{ $value }} messages on topic {{ $labels.topic }}.

  # ---------------------------------------------------------------------------
  # Intraday Market Data Alerts
  # ---------------------------------------------------------------------------
  - name: pyhron.intraday
    rules:
      - alert: IntradayIngestionStopped
        expr: |
          rate(pyhron_intraday_events_total[5m]) == 0
          and
          pyhron_intraday_events_total > 0
        for: 5m
        labels:
          severity: critical
          team: trading
          component: market-data
        annotations:
          summary: "Intraday market data ingestion has stopped"
          description: >
            No intraday events received in the last 5 minutes.
            Check Alpaca WebSocket connectivity and ingestion service health.

      - alert: IntradayPublishErrors
        expr: |
          rate(pyhron_intraday_publish_errors_total[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
          team: platform
          component: market-data
        annotations:
          summary: "Intraday data Kafka publish errors"
          description: >
            Kafka publish errors occurring on topic {{ $labels.topic }}
            at {{ $value | humanize }}/sec. Check Kafka broker health.

      - alert: IntradayPublishErrorsCritical
        expr: |
          rate(pyhron_intraday_publish_errors_total[5m]) > 1
        for: 1m
        labels:
          severity: critical
          team: platform
          component: market-data
        annotations:
          summary: "High rate of intraday Kafka publish failures"
          description: >
            Kafka publish errors at {{ $value | humanize }}/sec on
            topic {{ $labels.topic }}. Market data delivery compromised.

  # ---------------------------------------------------------------------------
  # Paper Trading Alerts
  # ---------------------------------------------------------------------------
  - name: pyhron.paper_trading
    rules:
      - alert: PaperTradingDrawdownWarning
        expr: |
          pyhron_paper_session_drawdown_pct > 10
        for: 1m
        labels:
          severity: warning
          team: trading
          component: paper-trading
        annotations:
          summary: "Paper trading session drawdown exceeds 10%"
          description: >
            Session {{ $labels.session_id }} drawdown is {{ $value }}%.
            Review strategy performance and risk parameters.

      - alert: PaperTradingDrawdownCritical
        expr: |
          pyhron_paper_session_drawdown_pct > 15
        for: 0m
        labels:
          severity: critical
          team: trading
          component: paper-trading
        annotations:
          summary: "Paper trading session drawdown exceeds 15%"
          description: >
            Session {{ $labels.session_id }} drawdown is {{ $value }}%.
            Consider stopping the session and reviewing the strategy.

      - alert: PaperTradingNegativeSharpe
        expr: |
          pyhron_paper_session_sharpe_ratio < -0.5
        for: 30m
        labels:
          severity: warning
          team: trading
          component: paper-trading
        annotations:
          summary: "Paper trading session has deeply negative Sharpe ratio"
          description: >
            Session {{ $labels.session_name }} Sharpe ratio is {{ $value }}.
            Strategy is significantly underperforming risk-free rate.

      - alert: PaperTradingLargeDailyLoss
        expr: |
          pyhron_paper_session_daily_pnl_idr < -5000000
        for: 0m
        labels:
          severity: warning
          team: trading
          component: paper-trading
        annotations:
          summary: "Paper trading daily loss exceeds IDR 5M"
          description: >
            Session {{ $labels.session_name }} daily P&L is
            IDR {{ $value | humanize }}. Large single-day loss detected.

  # ---------------------------------------------------------------------------
  # Risk Alerts
  # ---------------------------------------------------------------------------
  - name: pyhron.risk
    rules:
      - alert: HighOrderSubmissionRate
        expr: |
          rate(pyhron_orders_submitted_total[5m]) > 10
        for: 2m
        labels:
          severity: warning
          team: trading
          component: order-execution
        annotations:
          summary: "Unusually high order submission rate"
          description: >
            Orders being submitted at {{ $value | humanize }}/sec.
            Verify this is intentional and not a runaway strategy.

      - alert: OrderRejectionSpike
        expr: |
          rate(pyhron_orders_submitted_total{status="rejected"}[5m])
          / rate(pyhron_orders_submitted_total[5m])
          > 0.3
        for: 5m
        labels:
          severity: warning
          team: trading
          component: order-execution
        annotations:
          summary: "Order rejection rate exceeds 30%"
          description: >
            {{ $value | humanizePercentage }} of orders are being rejected.
            Check order parameters, risk limits, and market conditions.

  # ---------------------------------------------------------------------------
  # System Health Alerts
  # ---------------------------------------------------------------------------
  - name: pyhron.system
    rules:
      - alert: ServiceDown
        expr: up{job=~"pyhron-.*"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
          component: infrastructure
        annotations:
          summary: "Pyhron service is down"
          description: >
            Service {{ $labels.job }} on {{ $labels.instance }} has been
            unreachable for more than 1 minute.

      - alert: HighCPUUsage
        expr: |
          avg(rate(process_cpu_seconds_total{job="pyhron-api"}[5m])) > 0.85
        for: 10m
        labels:
          severity: warning
          team: platform
          component: compute
        annotations:
          summary: "High CPU usage on API service"
          description: >
            CPU usage is at {{ $value | humanizePercentage }}. Consider scaling
            up or investigating resource-intensive operations.

      - alert: HighMemoryUsage
        expr: |
          process_resident_memory_bytes{job="pyhron-api"}
          / on() group_left() machine_memory_bytes > 0.85
        for: 10m
        labels:
          severity: warning
          team: platform
          component: compute
        annotations:
          summary: "High memory usage on API service"
          description: >
            Memory usage is at {{ $value | humanizePercentage }}.
            Check for memory leaks or increase resource limits.

      - alert: DatabaseConnectionPoolExhausted
        expr: |
          pg_stat_activity_count{datname="pyhron"}
          / pg_settings_max_connections > 0.85
        for: 5m
        labels:
          severity: critical
          team: platform
          component: database
        annotations:
          summary: "PostgreSQL connection pool near exhaustion"
          description: >
            Database connections at {{ $value | humanizePercentage }} capacity.
            Increase pool size or investigate connection leaks.

      - alert: RedisHighMemory
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
          team: platform
          component: cache
        annotations:
          summary: "Redis memory usage is high"
          description: >
            Redis memory at {{ $value | humanizePercentage }}. Eviction policy
            may start clearing keys.

      - alert: WebSocketConnectionsDrop
        expr: |
          delta(pyhron_ws_active_connections[5m]) < -50
        for: 1m
        labels:
          severity: warning
          team: platform
          component: websocket
        annotations:
          summary: "Large drop in WebSocket connections"
          description: >
            WebSocket connections dropped by {{ $value }} in 5 minutes.
            Check for network issues or client-side errors.
