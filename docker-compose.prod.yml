# Production Docker Compose stack for Pyhron Trading Platform
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: timescale/timescaledb:2.14.2-pg15@sha256:0698d9bf8cfd81e042f653ff3be767682b376bf0e95b431b2922e2d8a72195d1
    restart: unless-stopped
    environment:
      POSTGRES_DB: pyhron
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$(cat /run/secrets/db_user) -d pyhron"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2g
    secrets:
      - db_user
      - db_password

  redis:
    # Pin to specific version; run `docker pull redis:7.2.4-alpine` and update digest
    image: redis:7.2.4-alpine@sha256:1b503bb77079ba644371969e06e1a6a1670bb1e1c0001ee7a6e5e9a51c2bfcaa
    restart: unless-stopped
    command: >-
      redis-server
      --requirepass $$(cat /run/secrets/redis_password)
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "$$(cat /run/secrets/redis_password)", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    secrets:
      - redis_password

  zookeeper:
    # Pin to specific version; verify digest with `docker pull confluentinc/cp-zookeeper:7.6.0`
    image: confluentinc/cp-zookeeper:7.6.0@sha256:7c3e867e48a21baa8caef87805e40c188c78f04b43d93e8dfa4eb1ed64f0a35a
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  kafka:
    # Pin to specific version; verify digest with `docker pull confluentinc/cp-kafka:7.6.0`
    image: confluentinc/cp-kafka:7.6.0@sha256:6a1bcf637ae7ae5025ee79e0cb6e6e0c4b24e3b5e0d1d8e0c7bde5e0ff9a5f3
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_started
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0@sha256:6a1bcf637ae7ae5025ee79e0cb6e6e0c4b24e3b5e0d1d8e0c7bde5e0ff9a5f3
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/scripts/create_topics.sh"]
    volumes:
      - ./scripts/kafka/create_topics.sh:/scripts/create_topics.sh:ro
    restart: "no"

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
      target: production
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      ENV: production
    secrets:
      - db_user
      - db_password
      - redis_password
      - jwt_secret
      - eodhd_api_token
      - alpaca_api_key
      - alpaca_api_secret
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1g

  celery-worker:
    build:
      context: .
      dockerfile: data_platform/Dockerfile
      target: production
    command: >-
      celery -A data_platform.tasks.celery_tasks worker
      --loglevel=info --concurrency=4
      --queues=ingestion,quality,backfill
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      ENV: production
    secrets:
      - db_user
      - db_password
      - redis_password
      - eodhd_api_token
    healthcheck:
      test: ["CMD-SHELL", "celery -A data_platform.tasks.celery_tasks inspect ping --timeout 5 2>/dev/null | grep -q 'pong'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g

  celery-beat:
    build:
      context: .
      dockerfile: data_platform/Dockerfile
      target: production
    command: >-
      celery -A data_platform.tasks.celery_tasks beat
      --loglevel=info
    restart: unless-stopped
    depends_on:
      - celery-worker
    environment:
      ENV: production
    secrets:
      - db_user
      - db_password
      - redis_password
    healthcheck:
      test: ["CMD-SHELL", "celery -A data_platform.tasks.celery_tasks inspect ping --timeout 5 2>/dev/null | grep -q 'pong'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m

  validation-consumer:
    build:
      context: .
      dockerfile: data_platform/Dockerfile
      target: production
    command: python -m data_platform.consumers.validation_consumer
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      ENV: production
    secrets:
      - db_user
      - db_password
    deploy:
      resources:
        limits:
          memory: 512m

  timescaledb-writer:
    build:
      context: .
      dockerfile: data_platform/Dockerfile
      target: production
    command: python -m data_platform.consumers.timescaledb_writer
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      ENV: production
    secrets:
      - db_user
      - db_password
    deploy:
      resources:
        limits:
          memory: 512m

  dlq-processor:
    build:
      context: .
      dockerfile: data_platform/Dockerfile
      target: production
    command: python -m data_platform.consumers.dlq_processor
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      ENV: production
    secrets:
      - db_user
      - db_password
    deploy:
      resources:
        limits:
          memory: 256m

  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d

  grafana:
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deploy/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_password
    secrets:
      - grafana_password

secrets:
  db_user:
    file: ./secrets/db_user.txt
  db_password:
    file: ./secrets/db_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  eodhd_api_token:
    file: ./secrets/eodhd_api_token.txt
  alpaca_api_key:
    file: ./secrets/alpaca_api_key.txt
  alpaca_api_secret:
    file: ./secrets/alpaca_api_secret.txt
  grafana_password:
    file: ./secrets/grafana_password.txt

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  kafka_data:
  prometheus_data:
  grafana_data:
