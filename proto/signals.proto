syntax = "proto3";
package pyhron.signals;

import "google/protobuf/timestamp.proto";

enum SignalDirection {
  SIGNAL_DIRECTION_UNSPECIFIED = 0;
  SIGNAL_DIRECTION_LONG = 1;
  SIGNAL_DIRECTION_SHORT = 2;
  SIGNAL_DIRECTION_CLOSE = 3;      // Close existing position
  SIGNAL_DIRECTION_REBALANCE = 4;  // Portfolio-level rebalance
}

// Signal: generated by strategy, consumed by Risk Engine
message Signal {
  string signal_id = 1;            // UUID v4
  string strategy_id = 2;
  string symbol = 3;
  string exchange = 4;
  SignalDirection direction = 5;
  double target_weight = 6;        // As % of portfolio (0.0 to 1.0)
  double confidence = 7;           // Model confidence (0.0 to 1.0)
  string signal_type = 8;          // "momentum", "mean_reversion", "pairs"
  map<string, double> factor_values = 9;  // Factor exposures that drove signal
  google.protobuf.Timestamp generated_at = 10;
  google.protobuf.Timestamp valid_until = 11;  // Signal expiry
}
