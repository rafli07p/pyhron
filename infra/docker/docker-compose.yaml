# Pyhron Trading Platform — Docker Compose (Local Development)
# Usage:
#   docker compose up -d                       # Start all services
#   docker compose --profile monitoring up -d  # Include Prometheus/Grafana
#   docker compose down -v                     # Tear down with volumes

services:
  # TimescaleDB — Time-series optimised PostgreSQL
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: pyhron-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pyhron}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pyhron}
      POSTGRES_DB: ${POSTGRES_DB:-pyhron}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../infra/init-timescaledb.sql:/docker-entrypoint-initdb.d/001-timescaledb.sql:ro
    # ports:
    #   - "${POSTGRES_PORT:-5432}:5432"  # Accessible via Docker network; no host exposure needed
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pyhron} -d ${POSTGRES_DB:-pyhron}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Redis — Caching, session store, Celery broker
  redis:
    image: redis:7.2-alpine
    container_name: pyhron-redis
    restart: unless-stopped
    command: >
      redis-server
        --appendonly yes
        --appendfsync everysec
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    # ports:
    #   - "${REDIS_PORT:-6379}:6379"  # Accessible via Docker network; no host exposure needed
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Zookeeper — Kafka coordination
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: pyhron-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka — Event streaming
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: pyhron-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_MESSAGE_MAX_BYTES: 10485760
    volumes:
      - kafkadata:/var/lib/kafka/data
    # ports:
    #   - "${KAFKA_PORT:-9092}:9092"  # Accessible via Docker network; no host exposure needed
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Kafka Init — Topic creation (run-once sidecar)
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: pyhron-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ../../infra/kafka/kafka-topics.sh:/kafka-topics.sh:ro
    entrypoint: ["/bin/bash", "/kafka-topics.sh"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    restart: "no"

  # API — FastAPI gateway
  api:
    build:
      context: ../..
      dockerfile: infra/docker/api_service.Dockerfile
    container_name: pyhron-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pyhron}:${POSTGRES_PASSWORD:-pyhron}@postgres:5432/${POSTGRES_DB:-pyhron}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${APP_SECRET_KEY:-local-dev-secret-key-min-32-chars-long}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-local-dev-jwt-secret-change-in-prod-min-64}
    ports:
      - "${APP_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Celery Worker — Data ingestion and analytics
  worker:
    build:
      context: ../..
      dockerfile: infra/docker/celery_worker.Dockerfile
    container_name: pyhron-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pyhron}:${POSTGRES_PASSWORD:-pyhron}@postgres:5432/${POSTGRES_DB:-pyhron}
      DATABASE_SYNC_URL: postgresql+psycopg://${POSTGRES_USER:-pyhron}:${POSTGRES_PASSWORD:-pyhron}@postgres:5432/${POSTGRES_DB:-pyhron}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    healthcheck:
      test: ["CMD", "celery", "-A", "shared.celery_app", "inspect", "ping", "-d", "celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Celery Beat — Scheduler
  beat:
    build:
      context: ../..
      dockerfile: infra/docker/celery_worker.Dockerfile
    container_name: pyhron-beat
    restart: unless-stopped
    depends_on:
      - worker
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
    command: >
      celery -A data_platform.tasks.celery_tasks:celery_app beat
        --loglevel=info
        --scheduler celery.beat:PersistentScheduler
    healthcheck:
      test: ["CMD", "celery", "-A", "shared.celery_app", "inspect", "ping", "-d", "celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # MLflow — ML experiment tracking
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.2
    container_name: pyhron-mlflow
    restart: unless-stopped
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:///mlflow/mlflow.db
        --default-artifact-root /mlflow/artifacts
    volumes:
      - mlruns:/mlflow
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Monitoring Stack (optional — --profile monitoring)
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: pyhron-prometheus
    restart: unless-stopped
    profiles:
      - monitoring
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ../../infra/monitoring/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:10.2.3
    container_name: pyhron-grafana
    restart: unless-stopped
    profiles:
      - monitoring
    ports:
      - "${GRAFANA_PORT:-3100}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-pyhron_grafana}
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - grafana-data:/var/lib/grafana

  web-public:
    build:
      context: ../../apps/web-public
      dockerfile: Dockerfile
    container_name: pyhron-web-public
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      FASTAPI_URL: http://api:8000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${APP_SECRET_KEY}
      NEXT_PUBLIC_USE_MSW: "false"
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  kafkadata:
  zookeeper_data:
  zookeeper_log:
  mlruns:
  prometheus-data:
  grafana-data:
