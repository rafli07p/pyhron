name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  proto-compile:
    name: Compile Protobuf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install protobuf compiler
        run: |
          pip install grpcio-tools~=1.62.0 protobuf~=4.25.0

      - name: Compile proto files
        run: |
          mkdir -p shared/proto_generated
          python -m grpc_tools.protoc \
            --proto_path=proto \
            --python_out=shared/proto_generated \
            proto/*.proto
          touch shared/proto_generated/__init__.py

      - name: Verify generated files match committed
        run: |
          if git diff --name-only | grep proto_generated; then
            echo "::error::Proto generated files are out of date. Run ./scripts/generate_proto.sh and commit."
            exit 1
          fi

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --no-interaction --with dev,lint

      - name: Ruff check
        run: poetry run ruff check .

      - name: Ruff format check
        run: poetry run ruff format --check .

      - name: Mypy
        run: poetry run mypy apps/ shared/ services/ data_platform/ strategy_engine/ commodity_linkage_engine/ macro_intelligence/ governance_intelligence/ --ignore-missing-imports

  migration-test:
    name: Migration Test
    runs-on: ubuntu-latest
    needs: [lint]

    services:
      postgres:
        image: timescale/timescaledb:2.17.2-pg16
        env:
          POSTGRES_USER: pyhron
          POSTGRES_PASSWORD: pyhron
          POSTGRES_DB: pyhron_migration_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-mig-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-mig-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run migrations (upgrade head)
        env:
          DATABASE_URL: postgresql+asyncpg://pyhron:pyhron@localhost:5433/pyhron_migration_test
        run: |
          poetry run alembic -c data_platform/alembic_migrations/alembic.ini upgrade head

      - name: Validate schema
        env:
          DATABASE_URL: postgresql+asyncpg://pyhron:pyhron@localhost:5433/pyhron_migration_test
        run: |
          poetry run python scripts/validate_migrations.py

      - name: Test full rollback (downgrade base)
        env:
          DATABASE_URL: postgresql+asyncpg://pyhron:pyhron@localhost:5433/pyhron_migration_test
        run: |
          poetry run alembic -c data_platform/alembic_migrations/alembic.ini downgrade base

      - name: Test idempotency (upgrade head again)
        env:
          DATABASE_URL: postgresql+asyncpg://pyhron:pyhron@localhost:5433/pyhron_migration_test
        run: |
          poetry run alembic -c data_platform/alembic_migrations/alembic.ini upgrade head

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint, migration-test]

    services:
      postgres:
        image: timescale/timescaledb:2.17.2-pg16
        env:
          POSTGRES_USER: pyhron
          POSTGRES_PASSWORD: pyhron
          POSTGRES_DB: pyhron_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: poetry install --no-interaction --with test

      - name: Run tests
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+asyncpg://pyhron:pyhron@localhost:5432/pyhron_test
          DATABASE_SYNC_URL: postgresql+psycopg://pyhron:pyhron@localhost:5432/pyhron_test
          REDIS_URL: redis://localhost:6379/0
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          APP_SECRET_KEY: ci-test-secret-key-minimum-32-chars
          JWT_SECRET_KEY: ci-test-jwt-secret-key-minimum-64-characters-for-testing
        run: |
          poetry run pytest -m "not slow and not integration and not e2e" \
            --tb=short --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Check for known vulnerabilities
        run: |
          pip install pip-audit
          pip-audit --ignore-vuln CVE-2026-4539  # pygments: no fix available, transitive dev-only dep

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: |
          docker build -f infra/docker/api_service.Dockerfile \
            -t pyhron-api:ci-${{ github.sha }} .

      - name: Build Worker image
        run: |
          docker build -f infra/docker/celery_worker.Dockerfile \
            -t pyhron-worker:ci-${{ github.sha }} .
