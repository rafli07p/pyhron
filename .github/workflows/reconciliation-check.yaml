name: Reconciliation Check

on:
  schedule:
    # Run after IDX market close (16:30 WIB = 09:30 UTC)
    - cron: "30 9 * * 1-5"
  workflow_dispatch:

jobs:
  reconciliation:
    name: Position Reconciliation
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run reconciliation
        env:
          APP_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          KAFKA_BOOTSTRAP_SERVERS: ${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          poetry run python -c "
          import asyncio
          import sys

          from services.order_management_system.position_reconciliation_monitor import (
              PositionReconciliationMonitor,
          )
          from services.broker_connectivity.alpaca_broker_adapter import AlpacaBrokerAdapter
          from shared.structured_json_logger import get_logger

          logger = get_logger('reconciliation-check')

          async def run_reconciliation():
              logger.info('reconciliation_check_started')

              adapter = AlpacaBrokerAdapter()
              await adapter.connect()

              monitor = PositionReconciliationMonitor(
                  broker_adapters={'ALPACA': adapter},
              )
              await monitor.start()

              try:
                  await monitor.reconcile()
                  logger.info('reconciliation_check_completed')
              except Exception as exc:
                  logger.critical('reconciliation_check_failed', error=str(exc))
                  sys.exit(1)
              finally:
                  await monitor.stop()
                  await adapter.disconnect()

          asyncio.run(run_reconciliation())
          "

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Reconciliation check failed — manual review required"
          echo "::error::Check logs for position discrepancies between internal state and broker"
