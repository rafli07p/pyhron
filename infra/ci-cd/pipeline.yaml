# Pyhron Trading Platform - CI/CD Pipeline (GitLab CI)
# This pipeline is designed for trunk-based development with feature flags.
# Reusable stages can be adapted for GitHub Actions or other CI systems.

variables:
  DOCKER_REGISTRY: "ghcr.io/pyhron"
  IMAGE_NAME: "pyhron-api"
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.7.1"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  POETRY_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pypoetry"
  TRIVY_SEVERITY: "HIGH,CRITICAL"

# Cache configuration
cache:
  key:
    files:
      - poetry.lock
  paths:
    - .cache/pip
    - .cache/pypoetry
    - .venv/

# Stage Definitions
stages:
  - lint
  - test
  - security
  - build
  - publish
  - deploy-staging
  - integration-test
  - deploy-production

# Reusable Templates
.python_setup: &python_setup
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - pip install poetry==${POETRY_VERSION}
    - poetry config virtualenvs.in-project true
    - poetry install --no-interaction

.docker_setup: &docker_setup
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"

.k8s_setup: &k8s_setup
  image: bitnami/kubectl:latest
  before_script:
    - echo "$KUBE_CONFIG" | base64 -d > /tmp/kubeconfig
    - export KUBECONFIG=/tmp/kubeconfig

# Lint Stage
lint:ruff:
  <<: *python_setup
  stage: lint
  script:
    - poetry run ruff check src/ tests/
    - poetry run ruff format --check src/ tests/
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

lint:mypy:
  <<: *python_setup
  stage: lint
  script:
    - poetry run mypy src/ --ignore-missing-imports
  allow_failure: true
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Test Stage
test:unit:
  <<: *python_setup
  stage: test
  services:
    - postgres:16-alpine
    - redis:7-alpine
  variables:
    POSTGRES_DB: pyhron_test
    POSTGRES_USER: pyhron
    POSTGRES_PASSWORD: test_password
    DATABASE_URL: "postgresql+asyncpg://pyhron:test_password@postgres:5432/pyhron_test"
    REDIS_URL: "redis://redis:6379/0"
  script:
    - poetry run pytest tests/unit/
      --cov=src/
      --cov-report=xml:coverage.xml
      --cov-report=term-missing
      --junitxml=junit-unit.xml
      -v
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    when: always
    reports:
      junit: junit-unit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 30 days
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test:integration:
  <<: *python_setup
  stage: test
  services:
    - postgres:16-alpine
    - redis:7-alpine
  variables:
    POSTGRES_DB: pyhron_test
    POSTGRES_USER: pyhron
    POSTGRES_PASSWORD: test_password
    DATABASE_URL: "postgresql+asyncpg://pyhron:test_password@postgres:5432/pyhron_test"
    REDIS_URL: "redis://redis:6379/0"
  script:
    - poetry run pytest tests/integration/
      --junitxml=junit-integration.xml
      -v
  artifacts:
    when: always
    reports:
      junit: junit-integration.xml
    expire_in: 30 days
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Security Stage
security:trivy-fs:
  <<: *docker_setup
  stage: security
  script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
    - trivy fs --severity ${TRIVY_SEVERITY} --exit-code 1 --no-progress .
  allow_failure: true
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

security:bandit:
  <<: *python_setup
  stage: security
  script:
    - pip install bandit[toml]
    - bandit -r src/ -c pyproject.toml -f json -o bandit-report.json || true
    - bandit -r src/ -c pyproject.toml
  artifacts:
    when: always
    paths:
      - bandit-report.json
    expire_in: 30 days
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

security:dependency-check:
  <<: *python_setup
  stage: security
  script:
    - poetry run pip-audit --strict --desc
  allow_failure: true
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Build Stage
build:docker:
  <<: *docker_setup
  stage: build
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - >
      docker build
      --file infra/docker/Dockerfile
      --tag "${DOCKER_REGISTRY}/${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}"
      --tag "${DOCKER_REGISTRY}/${IMAGE_NAME}:${CI_COMMIT_REF_SLUG}"
      --build-arg PYTHON_VERSION=${PYTHON_VERSION}
      --label "org.opencontainers.image.version=${CI_COMMIT_SHORT_SHA}"
      --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      --label "org.opencontainers.image.revision=${CI_COMMIT_SHA}"
      .
    - docker push "${DOCKER_REGISTRY}/${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}"
    - docker push "${DOCKER_REGISTRY}/${IMAGE_NAME}:${CI_COMMIT_REF_SLUG}"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build:trivy-scan:
  <<: *docker_setup
  stage: build
  needs: ["build:docker"]
  script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
    - trivy image --severity ${TRIVY_SEVERITY} --exit-code 1 --no-progress
      "${DOCKER_REGISTRY}/${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Publish Stage
publish:tag:
  <<: *docker_setup
  stage: publish
  needs: ["build:docker", "build:trivy-scan"]
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker pull "${DOCKER_REGISTRY}/${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}"
    - docker tag "${DOCKER_REGISTRY}/${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}"
      "${DOCKER_REGISTRY}/${IMAGE_NAME}:${CI_COMMIT_TAG}"
    - docker tag "${DOCKER_REGISTRY}/${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}"
      "${DOCKER_REGISTRY}/${IMAGE_NAME}:latest"
    - docker push "${DOCKER_REGISTRY}/${IMAGE_NAME}:${CI_COMMIT_TAG}"
    - docker push "${DOCKER_REGISTRY}/${IMAGE_NAME}:latest"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

# Deploy Staging
deploy:staging:
  <<: *k8s_setup
  stage: deploy-staging
  needs: ["build:docker", "build:trivy-scan"]
  environment:
    name: staging
    url: https://staging.pyhron.dev
  variables:
    K8S_NAMESPACE: pyhron-staging
  script:
    - kubectl set image deployment/pyhron-api
      pyhron-api="${DOCKER_REGISTRY}/${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}"
      --namespace ${K8S_NAMESPACE}
    - kubectl rollout status deployment/pyhron-api
      --namespace ${K8S_NAMESPACE}
      --timeout=300s
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Post-Deploy Integration Tests
integration-test:staging:
  <<: *python_setup
  stage: integration-test
  needs: ["deploy:staging"]
  variables:
    API_BASE_URL: "https://staging.pyhron.dev"
  script:
    - poetry run pytest tests/e2e/
      --junitxml=junit-e2e.xml
      -v
  artifacts:
    when: always
    reports:
      junit: junit-e2e.xml
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Deploy Production
deploy:production:
  <<: *k8s_setup
  stage: deploy-production
  needs: ["integration-test:staging"]
  environment:
    name: production
    url: https://api.pyhron.dev
  variables:
    K8S_NAMESPACE: pyhron
  script:
    - kubectl set image deployment/pyhron-api
      pyhron-api="${DOCKER_REGISTRY}/${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}"
      --namespace ${K8S_NAMESPACE}
    - kubectl rollout status deployment/pyhron-api
      --namespace ${K8S_NAMESPACE}
      --timeout=600s
    - |
      echo "Verifying production health..."
      for i in $(seq 1 30); do
        if curl -sf https://api.pyhron.dev/health > /dev/null; then
          echo "Production health check passed."
          exit 0
        fi
        echo "Health check attempt $i/30..."
        sleep 10
      done
      echo "Health check failed. Rolling back..."
      kubectl rollout undo deployment/pyhron-api --namespace ${K8S_NAMESPACE}
      exit 1
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
