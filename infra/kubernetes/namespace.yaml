# Pyhron - Kubernetes Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: pyhron
  labels:
    app.kubernetes.io/name: pyhron
    app.kubernetes.io/part-of: pyhron-platform
    app.kubernetes.io/managed-by: kubectl
  annotations:
    description: "Pyhron Quantitative Trading Platform"

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: pyhron-quota
  namespace: pyhron
spec:
  hard:
    requests.cpu: "20"
    requests.memory: 40Gi
    limits.cpu: "40"
    limits.memory: 80Gi
    pods: "100"
    services: "20"
    persistentvolumeclaims: "30"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: pyhron-limit-range
  namespace: pyhron
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "4"
        memory: 8Gi
      min:
        cpu: 50m
        memory: 64Mi

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pyhron-default-deny
  namespace: pyhron
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: pyhron
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: pyhron
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
        - port: 443
          protocol: TCP
