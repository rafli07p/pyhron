# =============================================================================
# Pyhron Trading Platform - Prometheus Configuration
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: "pyhron-production"
    environment: "production"

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"
      timeout: 10s

# Rule files
rule_files:
  - "/etc/prometheus/alerts.yml"

# Scrape configurations
scrape_configs:
  # -------------------------------------------------------------------------
  # Prometheus self-monitoring
  # -------------------------------------------------------------------------
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # -------------------------------------------------------------------------
  # Pyhron API service
  # -------------------------------------------------------------------------
  - job_name: "pyhron-api"
    metrics_path: "/metrics"
    scrape_interval: 10s
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "pyhron-api"
          component: "backend"
    # Kubernetes service discovery (used when deployed to K8s)
    # kubernetes_sd_configs:
    #   - role: pod
    #     namespaces:
    #       names:
    #         - pyhron
    # relabel_configs:
    #   - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
    #     action: keep
    #     regex: "true"
    #   - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
    #     action: replace
    #     target_label: __address__
    #     regex: (.+)
    #     replacement: ${1}:$1

  # -------------------------------------------------------------------------
  # Custom Quantitative Trading Metrics
  # -------------------------------------------------------------------------
  - job_name: "pyhron-quant-metrics"
    metrics_path: "/metrics/quant"
    scrape_interval: 5s
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "pyhron-quant"
          component: "trading"
    metric_relabel_configs:
      # Keep only relevant quant metrics to reduce storage
      - source_labels: [__name__]
        regex: "(pyhron_order_fill_latency_seconds|pyhron_orders_submitted_total|pyhron_paper_session_nav_idr|pyhron_paper_session_drawdown_pct|pyhron_paper_session_sharpe_ratio|pyhron_paper_session_daily_pnl_idr|pyhron_intraday_events_total|pyhron_intraday_publish_errors_total|pyhron_dlq_depth|pyhron_records_ingested_total)"
        action: keep

  # -------------------------------------------------------------------------
  # Intraday Ingestion service
  # -------------------------------------------------------------------------
  - job_name: "pyhron-ingestion"
    metrics_path: "/metrics"
    scrape_interval: 10s
    static_configs:
      - targets: ["intraday-ingestion:8001"]
        labels:
          service: "pyhron-ingestion"
          component: "data-pipeline"

  # -------------------------------------------------------------------------
  # PostgreSQL Exporter
  # -------------------------------------------------------------------------
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: "postgres"
          component: "database"

  # -------------------------------------------------------------------------
  # Redis Exporter
  # -------------------------------------------------------------------------
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: "redis"
          component: "cache"

  # -------------------------------------------------------------------------
  # Kafka Exporter
  # -------------------------------------------------------------------------
  - job_name: "kafka"
    static_configs:
      - targets: ["kafka-exporter:9308"]
        labels:
          service: "kafka"
          component: "messaging"

  # -------------------------------------------------------------------------
  # Node Exporter (system metrics)
  # -------------------------------------------------------------------------
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          component: "infrastructure"

  # -------------------------------------------------------------------------
  # MLflow
  # -------------------------------------------------------------------------
  - job_name: "mlflow"
    static_configs:
      - targets: ["mlflow:5000"]
        labels:
          service: "mlflow"
          component: "ml-platform"
