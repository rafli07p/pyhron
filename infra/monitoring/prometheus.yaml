# =============================================================================
# Enthropy Trading Platform - Prometheus Configuration
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: "enthropy-production"
    environment: "production"

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"
      timeout: 10s

# Rule files
rule_files:
  - "/etc/prometheus/alerts.yml"

# Scrape configurations
scrape_configs:
  # -------------------------------------------------------------------------
  # Prometheus self-monitoring
  # -------------------------------------------------------------------------
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # -------------------------------------------------------------------------
  # Enthropy API service
  # -------------------------------------------------------------------------
  - job_name: "enthropy-api"
    metrics_path: "/metrics"
    scrape_interval: 10s
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "enthropy-api"
          component: "backend"
    # Kubernetes service discovery (used when deployed to K8s)
    # kubernetes_sd_configs:
    #   - role: pod
    #     namespaces:
    #       names:
    #         - enthropy
    # relabel_configs:
    #   - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
    #     action: keep
    #     regex: "true"
    #   - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
    #     action: replace
    #     target_label: __address__
    #     regex: (.+)
    #     replacement: ${1}:$1

  # -------------------------------------------------------------------------
  # Custom Quantitative Trading Metrics
  # -------------------------------------------------------------------------
  - job_name: "enthropy-quant-metrics"
    metrics_path: "/metrics/quant"
    scrape_interval: 5s
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "enthropy-quant"
          component: "trading"
    metric_relabel_configs:
      # Keep only relevant quant metrics to reduce storage
      - source_labels: [__name__]
        regex: "(order_latency_seconds|pnl_daily_total|risk_var_current|risk_var_limit|position_exposure_total|drawdown_current_pct|sharpe_ratio_rolling|fill_rate_total|slippage_bps|order_count_total|market_data_lag_seconds)"
        action: keep

  # -------------------------------------------------------------------------
  # PostgreSQL Exporter
  # -------------------------------------------------------------------------
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: "postgres"
          component: "database"

  # -------------------------------------------------------------------------
  # Redis Exporter
  # -------------------------------------------------------------------------
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: "redis"
          component: "cache"

  # -------------------------------------------------------------------------
  # Kafka Exporter
  # -------------------------------------------------------------------------
  - job_name: "kafka"
    static_configs:
      - targets: ["kafka-exporter:9308"]
        labels:
          service: "kafka"
          component: "messaging"

  # -------------------------------------------------------------------------
  # Node Exporter (system metrics)
  # -------------------------------------------------------------------------
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          component: "infrastructure"

  # -------------------------------------------------------------------------
  # MLflow
  # -------------------------------------------------------------------------
  - job_name: "mlflow"
    static_configs:
      - targets: ["mlflow:5000"]
        labels:
          service: "mlflow"
          component: "ml-platform"
