# =============================================================================
# Pyhron Trading Platform — Docker Compose (Project Root)
# =============================================================================
# Delegates to infra/docker/docker-compose.yaml. Paths in the included
# file resolve relative to its own directory.
# Usage:
#   docker compose up -d                       # Start core services
#   docker compose --profile monitoring up -d  # Include Prometheus/Grafana
#   docker compose down -v                     # Tear down with volumes
# =============================================================================

include:
  - path: infra/docker/docker-compose.yaml
